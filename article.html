<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Read the full article on GlobalWire." />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
  <title>Article — GlobalWire</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script>
    (function () {
      var t = localStorage.getItem('globalWireTheme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
  <header class="navbar navbar--article">
    <a href="./index.html" class="navbar__brand">
      <img src="./assets/logo.svg" alt="" width="28" height="28" />
      <span>GlobalWire</span>
    </a>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
      <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
        <path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <main id="article-page" class="article-page">
    <div class="article-skeleton" id="article-loading">
      <div class="skeleton skeleton--hero"></div>
      <div class="skeleton skeleton--line"></div>
      <div class="skeleton skeleton--line skeleton--medium"></div>
      <div class="skeleton skeleton--line"></div>
      <div class="skeleton skeleton--line"></div>
    </div>
    <article id="article-content" hidden></article>
    <section id="related-section" class="section-block" hidden>
      <div class="section-header"><h2>Related News</h2></div>
      <div id="related-container" class="articles-grid articles-grid--related"></div>
    </section>
  </main>


  <script type="module" src="./js/article.js"></script>
</body>
</html>
